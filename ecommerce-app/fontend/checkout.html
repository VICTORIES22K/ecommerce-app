<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone - Checkout</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🛍️ ShopZone</a>
    <div class="nav-links">
      <a href="cart.html" class="btn btn-outline">← Back to Cart</a>
      <button class="btn btn-danger" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Checkout</h1>
    <div id="alertMsg" class="alert" style="display:none"></div>
    <div class="checkout-layout">
      <div class="checkout-form">
        <h3>Shipping Information</h3>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" class="form-input" placeholder="John Doe"/>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" class="form-input" placeholder="123 Main St"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" class="form-input" placeholder="New York"/>
          </div>
          <div class="form-group">
            <label>Postal Code</label>
            <input type="text" id="postalCode" class="form-input" placeholder="10001"/>
          </div>
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" id="country" class="form-input" placeholder="United States"/>
        </div>
        <h3 class="mt-2">Payment Method</h3>
        <div class="payment-options">
          <label class="payment-option">
            <input type="radio" name="payment" value="Cash on Delivery" checked/> Cash on Delivery
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="Credit Card"/> Credit Card (Demo)
          </label>
        </div>
      </div>

      <div class="order-review">
        <h3>Order Review</h3>
        <div id="orderItems"></div>
        <div class="summary-row mt-1"><span>Total</span><strong id="orderTotal">$0.00</strong></div>
        <button class="btn btn-primary btn-full mt-1" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNav();
      if (!getToken()) { window.location.href = 'login.html'; return; }

      const cart = getCart();
      if (!cart.length) { window.location.href = 'cart.html'; return; }

      const container = document.getElementById('orderItems');
      let total = 0;
      cart.forEach(item => {
        const t = item.price * item.quantity;
        total += t;
        const div = document.createElement('div');
        div.className = 'order-item-row';
        div.innerHTML = `<span>${item.name} × ${item.quantity}</span><span>$${t.toFixed(2)}</span>`;
        container.appendChild(div);
      });
      document.getElementById('orderTotal').textContent = `$${total.toFixed(2)}`;
    });

    async function placeOrder() {
      const alertEl = document.getElementById('alertMsg');
      const fullName = document.getElementById('fullName').value.trim();
      const address = document.getElementById('address').value.trim();
      const city = document.getElementById('city').value.trim();
      const postalCode = document.getElementById('postalCode').value.trim();
      const country = document.getElementById('country').value.trim();
      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

      if (!fullName || !address || !city || !postalCode || !country) {
        showAlert(alertEl, 'Please fill in all shipping fields.', 'error'); return;
      }

      const cart = getCart();
      const items = cart.map(i => ({
        product: i.id,
        name: i.name,
        price: i.price,
        quantity: i.quantity
      }));
      const totalPrice = cart.reduce((s, i) => s + i.price * i.quantity, 0);

      try {
        const res = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
          body: JSON.stringify({ items, shippingAddress: { fullName, address, city, postalCode, country }, totalPrice, paymentMethod })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(alertEl, data.message, 'error'); return; }

        saveCart([]);
        updateCartCount();
        showAlert(alertEl, '✅ Order placed successfully! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'orders.html', 2000);
      } catch (err) {
        showAlert(alertEl, 'Failed to place order.', 'error');
      }
    }

    function showAlert(el, msg, type) {
      el.textContent = msg;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
