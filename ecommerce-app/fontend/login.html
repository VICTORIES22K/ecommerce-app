<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone - Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🛍️ ShopZone</a>
    <div class="nav-links">
      <a href="index.html" class="btn btn-outline">← Back to Shop</a>
    </div>
  </nav>

  <main class="container auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      <div id="alertMsg" class="alert" style="display:none"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" class="form-input"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
      <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
      <div class="demo-creds">
        <p><strong>Admin Demo:</strong> admin@shop.com / admin123</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (getToken()) window.location.href = 'index.html';
      document.getElementById('password').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('alertMsg');

      if (!email || !password) {
        showAlert(alert, 'Please fill in all fields.', 'error'); return;
      }

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(alert, data.message, 'error'); return; }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = data.isAdmin ? 'admin.html' : 'index.html';
      } catch (err) {
        showAlert(alert, 'Connection error. Is the server running?', 'error');
      }
    }

    function showAlert(el, msg, type) {
      el.textContent = msg;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
